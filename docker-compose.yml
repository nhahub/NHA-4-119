version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lexora
      POSTGRES_USER: lexora
      POSTGRES_PASSWORD: lexora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexora -d lexora"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://lexora:lexora@db:5432/lexora}
      JOB_STORE_STRICT_DATABASE: "false"
      API_KEY: ${API_KEY:-dev-api-key-change-in-production}
      OpenRouter_API_KEY: ${OpenRouter_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      USE_LOCAL_MODEL: ${USE_LOCAL_MODEL:-false}
      LOCAL_MODEL_URL: ${LOCAL_MODEL_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: ${DEBUG:-false}
      APP_NAME: ${APP_NAME:-LEXORA Content Generation API}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8000}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./lexora-frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "3000:80"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: lexora-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: lexora-grafana
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus

volumes:
  postgres_data: